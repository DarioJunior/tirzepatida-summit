<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Tirzepatida AR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      color: #fff;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: 1.3rem;
      font-weight: 300;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #d4a853;
      margin-bottom: 0.3rem;
    }
    h2 {
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.5rem;
    }
    p {
      color: rgba(255,255,255,0.5);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    .ar-btn {
      display: inline-block;
      background: linear-gradient(135deg, #d4a853, #b8893a);
      color: #0a0a1a;
      padding: 1.2rem 2.5rem;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 700;
      text-decoration: none;
      letter-spacing: 1px;
      box-shadow: 0 0 40px rgba(212,168,83,0.3);
      margin-bottom: 0.5rem;
    }
    .fallback {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.3);
      margin-top: 1rem;
    }
    .fallback a {
      color: #d4a853;
    }
    .loader {
      width: 40px; height: 40px;
      border: 3px solid rgba(212,168,83,0.2);
      border-top-color: #d4a853;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 2rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="loading">
    <div class="loader"></div>
    <p>Preparando experiência AR...</p>
  </div>

  <div id="content" style="display:none;">
    <h1>Summit 2026</h1>
    <h2>Tirzepatida</h2>
    <p>Toque no botão para ver a molécula<br>em Realidade Aumentada</p>

    <!-- AR Quick Look (iOS) -->
    <a rel="ar" id="arLink" href="molecule.usdz" style="display:none;"></a>

    <a id="arBtn" class="ar-btn" href="molecule.usdz">
      👁️ VER EM AR
    </a>

    <p class="fallback">
      Android com Chrome? <a href="https://dariojunior.github.io/tirzepatida-summit/">Abrir experiência 3D</a>
    </p>
  </div>

  <script>
    // Detect iOS
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

    if (isIOS) {
      // iOS: auto-open AR Quick Look on page load
      document.getElementById('content').style.display = 'block';
      document.getElementById('loading').style.display = 'none';
      
      // Auto-click the AR link after a brief delay
      setTimeout(() => {
        document.getElementById('arLink').click();
      }, 500);
    } else if (navigator.xr) {
      // Android: try WebXR
      navigator.xr.isSessionSupported('immersive-ar').then(supported => {
        document.getElementById('content').style.display = 'block';
        document.getElementById('loading').style.display = 'none';
        if (!supported) {
          // Fallback: redirect to the 3D page
          document.querySelector('.fallback').innerHTML = 
            'RA não suportada. <a href="https://dariojunior.github.io/tirzepatida-summit/">Ver em 3D</a>';
        }
      });
    } else {
      document.getElementById('content').style.display = 'block';
      document.getElementById('loading').style.display = 'none';
    }
  </script>
</body>
</html>
